# Runs the full type-coverage integration suite on every supported platform.
#
# Each job drives the SAME Dart test file (example/integration_test/
# type_coverage_test.dart) through a different native implementation:
#   • Linux   → NativeImpl.cpp    (linux/src/HybridNitroTypeCoverage.cpp, GCC/Clang)
#   • Windows → NativeImpl.cpp    (windows/src/HybridNitroTypeCoverage.cpp, MSVC —
#                                   its own file, not shared with Linux; each
#                                   platform's CMakeLists.txt sets its own
#                                   NITRO_IMPL_SRC_nitro_type_coverage override)
#   • macOS   → NativeImpl.swift  (reference implementation)
#   • iOS     → NativeImpl.swift  (simulator, same Swift impl via ios/Classes)
#   • Android → NativeImpl.kotlin (x86_64 emulator, JNI bridge)
#
# The nitro_ecosystem repo is checked out alongside because the plugin (and
# its example) use path dependency_overrides onto the local packages while
# nitro_generator 0.5.5 (desktop C++ fixes) is unpublished. The directory
# layout mirrors the local dev machine:
#   <workspace>/nitro_plugins/nitro_type_coverage   (this repo)
#   <workspace>/flutter_package/nitro_ecosystem     (generator + runtime)
#
# CI runs the same scripts/run_tests.sh used locally, so local and CI stay
# in sync (it regenerates bindings with build_runner before testing — the
# generator itself is exercised on every run).

name: integration-tests

# On-demand only — the full 5-platform matrix is expensive (emulator/simulator
# boots, 4 desktop builds). Run it from the Actions tab (workflow_dispatch)
# before releases or after native-layer changes. The memory-leak checks in
# memory_leak.yml run on every push instead.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLUGIN_DIR: nitro_plugins/nitro_type_coverage

jobs:
  linux:
    name: Linux desktop (NativeImpl.cpp)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          path: nitro_plugins/nitro_type_coverage

      - uses: actions/checkout@v4
        with:
          repository: Shreemanarjun/nitro_ecosystem
          path: flutter_package/nitro_ecosystem

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev xvfb

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Run integration tests (Linux)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: xvfb-run -a ./scripts/run_tests.sh linux

  windows:
    name: Windows desktop (NativeImpl.cpp)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      # The test runner is a bash script — keep LF endings on checkout.
      - name: Disable autocrlf
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
        with:
          path: nitro_plugins/nitro_type_coverage

      - uses: actions/checkout@v4
        with:
          repository: Shreemanarjun/nitro_ecosystem
          path: flutter_package/nitro_ecosystem

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Run integration tests (Windows)
        working-directory: ${{ env.PLUGIN_DIR }}
        shell: bash
        run: ./scripts/run_tests.sh windows

  macos:
    name: macOS desktop (NativeImpl.swift)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: nitro_plugins/nitro_type_coverage

      - uses: actions/checkout@v4
        with:
          repository: Shreemanarjun/nitro_ecosystem
          path: flutter_package/nitro_ecosystem

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Run integration tests (macOS)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: ./scripts/run_tests.sh macos

  ios:
    name: iOS simulator (NativeImpl.swift)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: nitro_plugins/nitro_type_coverage

      - uses: actions/checkout@v4
        with:
          repository: Shreemanarjun/nitro_ecosystem
          path: flutter_package/nitro_ecosystem

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Boot iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          # Newest iOS runtime first; pick the first available iPhone.
          for runtime in sorted(devices.keys(), reverse=True):
              if 'iOS' not in runtime:
                  continue
              for dev in devices[runtime]:
                  if dev['name'].startswith('iPhone'):
                      print(dev['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Run integration tests (iOS simulator)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: ./scripts/run_tests.sh ios

  android:
    name: Android emulator (NativeImpl.kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: nitro_plugins/nitro_type_coverage

      - uses: actions/checkout@v4
        with:
          repository: Shreemanarjun/nitro_ecosystem
          path: flutter_package/nitro_ecosystem

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Hardware acceleration for the emulator on Linux runners.
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests (Android emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          working-directory: nitro_plugins/nitro_type_coverage
          script: ./scripts/run_tests.sh android

